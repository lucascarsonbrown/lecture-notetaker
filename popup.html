<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Lecture Transcript</title>
    <style>
      :root {
        --bg: #ffffff;
        --bg2: #f8f9fa;
        --text: #1a1a1a;
        --text2: #6b7280;
        --border: #e5e7eb;
        --accent: #bf5700;
        --accent-hover: #a04a00;
        --error-bg: #fef2f2;
        --error-text: #dc2626;
      }

      body.dark {
        --bg: #1a1a1a;
        --bg2: #242424;
        --text: #f3f4f6;
        --text2: #9ca3af;
        --border: #374151;
        --error-bg: #2d1a1a;
        --error-text: #fca5a5;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        width: 420px;
        background: var(--bg);
        color: var(--text);
      }

      .header {
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
        padding: 16px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .title {
        font-size: 16px;
        font-weight: 600;
      }

      .theme-btn {
        background: none;
        border: 1px solid var(--border);
        width: 32px;
        height: 32px;
        border-radius: 7px;
        cursor: pointer;
        font-size: 14px;
        color: var(--text2);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .theme-btn:hover { background: var(--bg); }

      .body {
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .btn {
        width: 100%;
        padding: 12px;
        font-size: 14px;
        font-weight: 600;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        background: var(--accent);
        color: white;
        transition: background 0.15s, transform 0.1s;
      }

      .btn:hover:not(:disabled) {
        background: var(--accent-hover);
        transform: translateY(-1px);
      }

      .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

      .btn-secondary {
        background: var(--bg2);
        color: var(--text);
        border: 1px solid var(--border);
      }

      .btn-secondary:hover:not(:disabled) {
        background: var(--border);
        transform: translateY(-1px);
      }

      .status {
        font-size: 13px;
        color: var(--text2);
        text-align: center;
        padding: 10px;
        background: var(--bg2);
        border-radius: 7px;
        display: none;
      }

      .status.error {
        color: var(--error-text);
        background: var(--error-bg);
      }

      .status.visible { display: block; }

      .transcript-area {
        width: 100%;
        height: 220px;
        padding: 12px;
        font-size: 13px;
        line-height: 1.6;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        resize: vertical;
        font-family: inherit;
        display: none;
      }

      .transcript-area.visible { display: block; }

      .word-count {
        font-size: 12px;
        color: var(--text2);
        text-align: right;
        display: none;
      }

      .word-count.visible { display: block; }
    </style>
  </head>
  <body>
    <div class="header">
      <span class="title">Lecture Transcript</span>
      <button class="theme-btn" id="theme-btn">🌙</button>
    </div>
    <div class="body">
      <button class="btn" id="fetch-btn">Get Transcript</button>
      <div class="status" id="status"></div>
      <textarea class="transcript-area" id="transcript" readonly></textarea>
      <div class="word-count" id="word-count"></div>
      <button class="btn btn-secondary" id="copy-btn" style="display:none">Copy to Clipboard</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
